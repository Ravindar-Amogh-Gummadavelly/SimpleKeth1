events {
    worker_connections 1024;
}

http {
    upstream frontend {
        server frontend:3000;
    }

    upstream prediction_api {
        server prediction:8001;
    }

    upstream recommendation_api {
        server recommendation:8002;
    }

    upstream notification_api {
        server notification:8003;
    }

    upstream profile_api {
        server profile:8004;
    }

    server {
        listen 80;
        server_name localhost;

        # Compression
        gzip on;
        gzip_types text/plain application/json application/javascript text/css;
        gzip_min_length 1000;

        # API routes
        location /api/predict {
            proxy_pass http://prediction_api/predict;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/recommend {
            proxy_pass http://recommendation_api/recommend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/notify {
            proxy_pass http://notification_api/notify;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/farmers {
            proxy_pass http://profile_api/farmers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/mandis {
            proxy_pass http://profile_api/mandis;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/crops {
            proxy_pass http://profile_api/crops;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Health checks
        location /api/health/prediction {
            proxy_pass http://prediction_api/health;
        }

        location /api/health/recommendation {
            proxy_pass http://recommendation_api/health;
        }

        location /api/health/notification {
            proxy_pass http://notification_api/health;
        }

        location /api/health/profile {
            proxy_pass http://profile_api/health;
        }

        # Frontend (catch-all)
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
