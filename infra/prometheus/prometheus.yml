global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prediction-service"
    static_configs:
      - targets: ["prediction:8001"]
    metrics_path: "/health"

  - job_name: "recommendation-service"
    static_configs:
      - targets: ["recommendation:8002"]
    metrics_path: "/health"

  - job_name: "notification-service"
    static_configs:
      - targets: ["notification:8003"]
    metrics_path: "/health"

  - job_name: "profile-service"
    static_configs:
      - targets: ["profile:8004"]
    metrics_path: "/health"
