name: SimpleKeth CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Frontend Lint & Test ─────────────────────────
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  # ─── Backend Lint & Test ──────────────────────────
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pip install ruff pytest pytest-asyncio httpx
      - run: ruff check .
      - run: pytest --tb=short -q

  # ─── Docker Build ─────────────────────────────────
  docker:
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build frontend image
        run: docker build -t simpleketh-frontend:latest ./frontend
      - name: Build prediction service
        run: docker build -t simpleketh-prediction:latest -f backend/prediction_service/Dockerfile ./backend
      - name: Build recommendation service
        run: docker build -t simpleketh-recommendation:latest -f backend/recommendation_service/Dockerfile ./backend
      - name: Build notification service
        run: docker build -t simpleketh-notification:latest -f backend/notification_service/Dockerfile ./backend
      - name: Build profile service
        run: docker build -t simpleketh-profile:latest -f backend/profile_service/Dockerfile ./backend
